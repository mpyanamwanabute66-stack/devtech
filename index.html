<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cianney Tech</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  background: #0a0f2c;
}

header h1 {
  color: #00ff88;
  margin: 0;
}

/* TITRE */
.hero {
  padding: 20px;
}

.hero h2 {
  font-size: 28px;
}

/* VIDEO */
iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
  border: none;
  margin: 15px 0;
}

/* BOUTON */
.btn {
  display: block;
  text-align: center;
  background: red;
  padding: 12px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  margin: 20px;
}

/* ARTICLES */
#articles {
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  <h1>CIANNEY TECH</h1>
</header>

<section class="hero">
  <h2>Actualités & tests smartphones</h2>

  <h3>🎥 Ma vidéo</h3>

  <iframe src="https://www.youtube.com/embed/ueXc7iOh9pw" allowfullscreen></iframe>

  <a href="https://www.youtube.com/@MpyanaMwanabute" target="_blank" class="btn">
    👉 Voir ma chaîne YouTube
  </a>
</section>

<section id="articles">
  <h2>Articles</h2>
</section>

<script>
const articles = [
  {
    title: "Top smartphones 2026",
    content: "Voici les meilleurs téléphones..."
  },
  {
    title: "Android vs iPhone",
    content: "Comparaison complète..."
  }
];

const container = document.getElementById("articles");

articles.forEach(a => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${a.title}</h3>
    <p>${a.content}</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
